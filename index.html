    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --black: #0d0d0d;
            --white: #fafafa;
            --accent: #f3414f;
            --gray: #888;
        }

        body {
            font-family: 'DM Sans', -apple-system, sans-serif;
            background: var(--black);
            color: var(--white);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Grid layout */
        .page {
            display: grid;
            grid-template-columns: 1fr 1fr;
            min-height: 100vh;
        }

        /* Left side - Photo */
        .photo-side {
            position: sticky;
            top: 0;
            height: 100vh;
            background: var(--black);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .photo-side img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            object-position: center;
            display: block;
        }

        .photo-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 50%;
            background: linear-gradient(to top, var(--black), transparent);
            pointer-events: none;
        }

        .photo-accent {
            position: absolute;
            top: 2rem;
            left: 2rem;
            width: 80px;
            height: 3px;
            background: var(--accent);
        }

        /* Right side - Content */
        .content-side {
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            padding: 4rem 4rem 5rem;
            position: relative;
            min-height: 100vh;
        }

        .content-inner {
            max-width: 460px;
            width: 100%;
            margin: auto 0;
        }

        /* Typography */
        .label {
            font-size: 0.75rem;
            font-weight: 500;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 1.5rem;
        }

        h1 {
            font-family: 'Cormorant', Georgia, serif;
            font-size: clamp(3rem, 6vw, 5rem);
            font-weight: 600;
            line-height: 1.1;
            margin-bottom: 0.5rem;
        }

        h1 span {
            font-style: italic;
            color: var(--gray);
        }

        .subtitle {
            font-family: 'Cormorant', Georgia, serif;
            font-size: 1.5rem;
            font-style: italic;
            color: var(--gray);
            margin-bottom: 3rem;
        }

        /* Countdown */
        .countdown-section {
            margin-bottom: 3rem;
        }

        .countdown-label {
            font-size: 0.85rem;
            color: var(--gray);
            margin-bottom: 1rem;
        }

        .countdown {
            display: flex;
            gap: 2rem;
        }

        .countdown-item {
            text-align: left;
        }

        .countdown-number {
            font-family: 'Cormorant', serif;
            font-size: 3.5rem;
            font-weight: 700;
            line-height: 1;
            color: var(--white);
        }

        .countdown-unit {
            font-size: 0.7rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--gray);
            margin-top: 0.25rem;
        }

        /* Buttons */
        .actions {
            display: flex;
            gap: 1rem;
            margin-bottom: 3rem;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            padding: 1rem 1.75rem;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 0.05em;
            text-decoration: none;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: var(--accent);
            color: var(--white);
        }

        .btn-primary:hover {
            background: #ff5a2b;
            transform: translateY(-2px);
        }

        .btn-outline {
            background: transparent;
            color: var(--white);
            border: 1px solid rgba(255,255,255,0.2);
        }

        .btn-outline:hover {
            border-color: var(--white);
            background: rgba(255,255,255,0.05);
        }

        /* Contact */
        .contact {
            padding-top: 2rem;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .contact-label {
            font-size: 0.7rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--gray);
            margin-bottom: 0.5rem;
        }

        .contact-email {
            font-family: 'Cormorant', serif;
            font-size: 1.1rem;
            color: var(--white);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .contact-email:hover {
            color: var(--accent);
        }

        /* Vertical text */
        .vertical-text {
            position: absolute;
            right: 2rem;
            top: 50%;
            transform: translateY(-50%) rotate(90deg);
            transform-origin: center;
            font-size: 0.65rem;
            letter-spacing: 0.4em;
            text-transform: uppercase;
            color: var(--gray);
            white-space: nowrap;
        }

        /* Tablet */
        @media (max-width: 900px) {
            .page {
                grid-template-columns: 1fr;
                grid-template-rows: auto auto;
            }

            .photo-side {
                position: relative;
                top: auto;
                height: auto;
            }

            .photo-side img {
                height: auto;
                max-height: 80vw;
            }

            .content-side {
                padding: 2.5rem 2rem 3rem;
                min-height: auto;
            }

            .content-inner {
                margin: 0 auto;
            }

            .vertical-text {
                display: none;
            }

            h1 {
                font-size: 2.8rem;
            }

            .subtitle {
                margin-bottom: 2rem;
            }

            .countdown {
                gap: 1.5rem;
            }

            .countdown-number {
                font-size: 2.8rem;
            }

            .countdown-section {
                margin-bottom: 2rem;
            }

            .actions {
                margin-bottom: 2rem;
            }
        }

        /* Mobile */
        @media (max-width: 600px) {
            .photo-side img {
                max-height: 100vw;
            }

            .photo-accent {
                top: 1rem;
                left: 1rem;
                width: 50px;
            }

            .content-side {
                padding: 2rem 1.5rem 2.5rem;
            }

            .label {
                font-size: 0.65rem;
                margin-bottom: 1rem;
            }

            h1 {
                font-size: 2.2rem;
            }

            .subtitle {
                font-size: 1.2rem;
                margin-bottom: 1.5rem;
            }

            .countdown-label {
                font-size: 0.8rem;
            }

            .countdown {
                display: grid;
                grid-template-columns: repeat(4, 1fr);
                gap: 0.75rem;
                background: rgba(255,255,255,0.03);
                padding: 1.25rem 1rem;
                border-radius: 8px;
                border: 1px solid rgba(255,255,255,0.06);
            }

            .countdown-item {
                text-align: center;
            }

            .countdown-number {
                font-size: 1.75rem;
            }

            .countdown-unit {
                font-size: 0.6rem;
                margin-top: 0.15rem;
            }

            .actions {
                flex-direction: column;
            }

            .btn {
                justify-content: center;
                padding: 1.1rem 1.5rem;
                font-size: 0.9rem;
            }

            .contact {
                padding-top: 1.5rem;
            }

            .contact-email {
                font-size: 0.95rem;
                word-break: break-all;
            }
        }

        /* Small phones */
        @media (max-width: 380px) {
            h1 {
                font-size: 1.9rem;
            }

            .countdown-number {
                font-size: 1.5rem;
            }
        }

        /* Animation */
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .content-inner > * {
            animation: fadeUp 0.8s ease-out backwards;
        }

        .label { animation-delay: 0.1s; }
        h1 { animation-delay: 0.2s; }
        .subtitle { animation-delay: 0.3s; }
        .countdown-section { animation-delay: 0.4s; }
        .streaming-section { animation-delay: 0.45s; }
        .video-section { animation-delay: 0.5s; }
        .social-links { animation-delay: 0.55s; }
        .contact { animation-delay: 0.6s; }

        /* Pulse animation on seconds */
        @keyframes pulse {
            0%   { transform: scale(1); }
            30%  { transform: scale(1.12); color: var(--accent); }
            100% { transform: scale(1); }
        }

        .countdown-number.pulse {
            animation: pulse 0.4s ease-out;
        }

        /* Social links */
        .social-links {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 2.5rem;
        }

        .social-link {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255,255,255,0.15);
            transition: all 0.3s ease;
            text-decoration: none;
            color: var(--white);
        }

        .social-link svg {
            width: 17px;
            height: 17px;
            fill: currentColor;
        }

        .social-link.active:hover {
            border-color: var(--accent);
            background: rgba(243,65,79,0.1);
            color: var(--accent);
            transform: translateY(-2px);
        }

        .social-link.locked {
            opacity: 0.3;
            cursor: not-allowed;
            pointer-events: none;
        }

        /* Streaming */
        .streaming-section {
            margin-bottom: 2.5rem;
        }

        .streaming-label {
            font-size: 0.7rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--gray);
            margin-bottom: 0.85rem;
        }

        .streaming-cta {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            padding: 1.1rem 1.4rem;
            background: linear-gradient(135deg, rgba(243,65,79,0.12), rgba(243,65,79,0.03));
            border: 1px solid rgba(243,65,79,0.35);
            border-radius: 12px;
            text-decoration: none;
            color: var(--white);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .streaming-cta::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.06), transparent);
            transition: left 0.6s ease;
        }

        .streaming-cta:hover::before {
            left: 100%;
        }

        .streaming-cta:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(243,65,79,0.18);
        }

        .streaming-cta-text {
            display: flex;
            align-items: center;
            gap: 0.9rem;
            min-width: 0;
        }

        .streaming-cta-icon {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .streaming-cta-icon svg {
            width: 16px;
            height: 16px;
            fill: white;
            margin-left: 3px;
        }

        .streaming-cta-title {
            font-size: 0.95rem;
            font-weight: 500;
            line-height: 1.25;
        }

        .streaming-cta-sub {
            font-size: 0.7rem;
            color: var(--gray);
            margin-top: 0.15rem;
        }

        .streaming-cta-arrow {
            color: var(--accent);
            font-size: 1.1rem;
            flex-shrink: 0;
            transition: transform 0.2s ease;
        }

        .streaming-cta:hover .streaming-cta-arrow {
            transform: translateX(4px);
        }

        /* Logos row */
        .streaming-logos {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem 1.25rem;
            margin-top: 0.9rem;
            padding: 0 0.25rem;
        }

        .platform-logo {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.72rem;
            font-weight: 500;
            letter-spacing: 0.02em;
            color: rgba(255,255,255,0.5);
            transition: color 0.2s ease;
        }

        .streaming-cta:hover ~ .streaming-logos .platform-logo {
            color: rgba(255,255,255,0.75);
        }

        .platform-logo svg {
            width: 14px;
            height: 14px;
            flex-shrink: 0;
            fill: currentColor;
        }

        @media (max-width: 500px) {
            .streaming-logos {
                gap: 0.5rem 0.9rem;
            }
            .platform-logo {
                font-size: 0.68rem;
            }
        }

        /* Video */
        .video-section {
            margin-bottom: 2.5rem;
        }

        .video-label {
            font-size: 0.7rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--gray);
            margin-bottom: 0.75rem;
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 12px 40px rgba(0,0,0,0.5);
        }

        .video-wrapper iframe {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .social-label {
            font-size: 0.65rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--gray);
            margin-bottom: 0.6rem;
        }
    </style>
</head>

    <script>
        function updateCountdown() {
            const end = new Date('2026-04-23T00:00:00').getTime();
            const now = Date.now();
            const diff = end - now;

            if (diff < 0) {
                document.querySelector('.countdown-section').style.display = 'none';
                return;
            }

            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);

            document.getElementById('days').textContent = d;
            document.getElementById('hours').textContent = h.toString().padStart(2, '0');
            document.getElementById('minutes').textContent = m.toString().padStart(2, '0');

            const secEl = document.getElementById('seconds');
            secEl.textContent = s.toString().padStart(2, '0');
            secEl.classList.remove('pulse');
            void secEl.offsetWidth;
            secEl.classList.add('pulse');
        }

        updateCountdown();
        setInterval(updateCountdown, 1000);
    </script>
